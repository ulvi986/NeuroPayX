<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Səhifə tapılmadı — 404</title>
  <style>
    :root{--bg:#f6f7fb;--card:#ffffff;--muted:#6b7280;--accent:#7c3aed;--glass: rgba(124,58,237,0.08)}
    html,body{height:100%;margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial}
    body{background:linear-gradient(180deg,#f8fafc 0%,var(--bg) 100%);display:flex;align-items:center;justify-content:center;padding:32px}
    .card{background:var(--card);max-width:980px;width:100%;border-radius:14px;box-shadow:0 8px 30px rgba(15,23,42,0.08);display:flex;overflow:hidden}
    .left{flex:1;padding:48px 40px}
    .right{width:380px;background:linear-gradient(180deg,rgba(124,58,237,0.06),transparent);display:flex;align-items:center;justify-content:center;padding:28px}
    h1{font-size:28px;margin:0 0 8px;color:#0f172a}
    p.lead{margin:0 0 20px;color:var(--muted);line-height:1.5}
    .code{display:inline-block;background:var(--glass);padding:6px 10px;border-radius:8px;font-weight:600;color:var(--accent);font-size:13px}
    .actions{display:flex;gap:12px;margin-top:18px}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;border:0;cursor:pointer;font-weight:600}
    .btn-primary{background:linear-gradient(90deg,var(--accent),#5b21b6);color:#fff;box-shadow:0 6px 20px rgba(124,58,237,0.12)}
    .btn-ghost{background:transparent;color:var(--muted);border:1px solid rgba(15,23,42,0.06)}
    .search{margin-top:20px;display:flex;gap:8px}
    .search input{flex:1;padding:12px 14px;border-radius:10px;border:1px solid rgba(15,23,42,0.06);font-size:14px}
    .meta{margin-top:22px;color:#94a3b8;font-size:13px}
    .illustration{width:220px;height:220px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(124,58,237,0.12),rgba(99,102,241,0.06));box-shadow:inset 0 -10px 30px rgba(99,102,241,0.02)}
    svg{max-width:160px}
    footer.small{font-size:12px;color:var(--muted);margin-top:14px}
    @media (max-width:880px){
      .card{flex-direction:column}
      .right{width:100%}
      .left{padding:28px}
    }
    /* subtle float animation for the SVG */
    .float{animation:float 6s ease-in-out infinite}
    @keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-10px)}100%{transform:translateY(0)}}
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="title">
    <div class="left">
      <span class="code">404</span>
      <h1 id="title">Səhifə tapılmadı</h1>
      <p class="lead">Üzr istəyirik — axtardığınız səhifə mövcud deyil və ya yeri dəyişdirilib.</p>


      <div class="actions">
        <a href = "{% url 'menu' %}" >
            <button class="btn btn-primary" id="homeBtn">Ana səhifəyə qayıt</button>
        </a>
        <a href = "{% url 'support_center' %}" >
            <button class="btn btn-ghost" id="contactBtn">Dəstək ilə əlaqə</button>
        </a>
      </div>

      <div class="meta">
        <div class="small">Əgər bu səhifə əvvəl düzgün göstərilirdisə, xahiş edirik dəstək komandamıza müraciət edin.</div>
      </div>
    </div>

    <div class="right" aria-hidden="true">
      <div>
        <div class="illustration float" role="img" aria-label="404 illustration">
          <!-- friendly search/compass svg -->
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <g fill="none" fill-rule="evenodd">
              <circle cx="28" cy="28" r="18" fill="#EEF2FF"/>
              <path d="M38.4 38.4L50 50" stroke="#C7B8FF" stroke-width="3" stroke-linecap="round"/>
              <path d="M24 20c4-3 12-4 16 0 2 2 2 6 0 8-4 4-12 3-16 0-2-2-2-6 0-8z" fill="#7C3AED" opacity="0.95"/>
            </g>
          </svg>
        </div>
        <div style="text-align:center;margin-top:12px;color:var(--muted);font-size:13px">Səhifəni tapmaqda kömək lazımdırsa, bizə yazın.</div>
      </div>
    </div>
  </div>

  <script>
    // Fill current path for debugging / UX
    const pathEl = document.getElementById('currentPath');
    pathEl.textContent = location.pathname + location.search;

    // Buttons
    document.getElementById('homeBtn').addEventListener('click', ()=> location.href = '/');
    document.getElementById('contactBtn').addEventListener('click', ()=> location.href = '/contact');

    // Search behavior: goes to /search?q=... (adjust to your app routes)
    function doSearch(){
      const q = document.getElementById('searchInput').value.trim();
      if(!q) { document.getElementById('searchInput').focus(); return }
      const encoded = encodeURIComponent(q);
      // modify this target if your site uses a different search route
      location.href = '/search?q=' + encoded;
    }
    document.getElementById('searchBtn').addEventListener('click', doSearch);
    document.getElementById('searchInput').addEventListener('keydown', (e)=>{ if(e.key === 'Enter') doSearch() });

    // Accessibility: focus first actionable element
    document.getElementById('searchInput').focus();
  </script>
</body>
</html>
